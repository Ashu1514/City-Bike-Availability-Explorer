<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}City Bike Explorer{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── header ── */
        header {
            background: #2c7be5;
            color: white;
            padding: 10px 20px;
            text-align: center;
            flex-shrink: 0;
        }
        header h1 { font-size: 18px; }
        header p  { font-size: 11px; opacity: 0.85; }

        /* ── shared button styles ── */
        .btn {
            padding: 8px 18px;
            background: #2c7be5;
            color: white;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn:hover { background: #1a63c5; }
        .btn-outline {
            background: #f0f4ff;
            color: #2c7be5;
            border: 2px solid #2c7be5;
        }
        .btn-outline:hover { background: #2c7be5; color: white; }

        /* ── shared error style ── */
        .error-msg {
            text-align: center;
            padding: 6px;
            color: #c0392b;
            background: #fdecea;
            font-size: 13px;
            flex-shrink: 0;
        }

        /* ── shared stats bar ── */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 6px;
            background: #e8f0fe;
            text-align: center;
            flex-shrink: 0;
        }
        .stat-label { font-size: 11px; color: #555; }
        .stat-value { font-size: 16px; font-weight: bold; color: #2c7be5; }

        /* ── dot colors ── */
        .dot {
            width: 11px; height: 11px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.green  { background: #27ae60; }
        .dot.orange { background: #e67e22; }
        .dot.red    { background: #e74c3c; }

    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>

<header>
    <h1> City Bike 🚲 & Scooter Explorer 🛴 </h1>
    <p>Find available bikes and scooters near you  </p>
</header>

{% block content %}{% endblock %}

{% block extra_scripts %}{% endblock %}

</body>
</html>
