{% extends "base.html" %}

{% block content %}

<div class="p-4 bg-light rounded">
    <h1>City Bike Availability Explorer</h1>

    <p>
        This project helps users search a city, explore public bike-sharing stations,
        view availability on a map, and save snapshots using SQLite.
    </p>

    <form method="GET" action="#">
        <div class="mb-3">
            <label for="city" class="form-label">Search City</label>
            <input type="text" class="form-control" id="city" name="city" placeholder="Example: Stuttgart">
        </div>

        <button type="submit" class="btn btn-primary" disabled>
            Search City - Coming Soon
        </button>
    </form>
</div>

{% endblock %}
